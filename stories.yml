# ---------------------------------------------------------------------------
# STORY 9: Full high-sustainability planning flow
# ---------------------------------------------------------------------------
- story: high sustainability planning
  steps:
    - intent: greet
    - action: utter_greet
    - intent: plan_trip
    - action: utter_collecting_info
    - action: trip_planning_form
