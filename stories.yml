# =============================================================================
# Eco-Travel Advisor - Stories
# NOTE: Rules handle single-turn responses. Stories handle multi-turn flows.
# Stories must NOT contradict rules.
# =============================================================================

version: "3.1"

stories:

# ---------------------------------------------------------------------------
# STORY 1: Full trip planning — ends after summary (rules handle follow-ups)
# ---------------------------------------------------------------------------
- story: complete trip planning flow
  steps:
    - intent: greet
    - action: utter_greet
    - intent: plan_trip
    - action: utter_collecting_info
    - action: trip_planning_form
    - active_loop: trip_planning_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: action_trip_summary

# ---------------------------------------------------------------------------
# STORY 2: Plan trip then ask hotels (two separate turns)
# ---------------------------------------------------------------------------
- story: plan trip then ask hotels
  steps:
